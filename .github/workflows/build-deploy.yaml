name: Build, Scan and Push
on:
  push:
    branches: [main]
    paths:
      - 'src/**'

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - cartservice
          - checkoutservice
          - productcatalogservice
          - currencyservice
          - paymentservice
          - shippingservice
          - emailservice
          - recommendationservice
          - adservice

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          if [ "${{ matrix.service }}" = "cartservice" ]; then
            docker build \
              -t $ECR_REGISTRY/boutique/${{ matrix.service }}:${{ github.sha }} \
              ./src/${{ matrix.service }}/src
          else
            docker build \
              -t $ECR_REGISTRY/boutique/${{ matrix.service }}:${{ github.sha }} \
              ./src/${{ matrix.service }}
          fi

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/boutique/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL

      - name: Push to ECR
        run: |
          docker push $ECR_REGISTRY/boutique/${{ matrix.service }}:${{ github.sha }}
          docker tag $ECR_REGISTRY/boutique/${{ matrix.service }}:${{ github.sha }} \
                     $ECR_REGISTRY/boutique/${{ matrix.service }}:latest
          docker push $ECR_REGISTRY/boutique/${{ matrix.service }}:latest
